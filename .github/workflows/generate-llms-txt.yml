name: Generate llms.txt

on:
  pull_request:
    branches:
      - main
    paths:
      - "plugins/**/README.md"
      - "docs/**"
      - "examples/**/README.md"
      - "packages/**/README.md"
      - ".github/scripts/generate-llms-txt.sh"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    # Skip forks — GITHUB_TOKEN can't push to fork branches
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Generate llms.txt
        run: bash .github/scripts/generate-llms-txt.sh

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet llms.txt || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add llms.txt
          git commit -m "chore: regenerate llms.txt [skip ci]"
          git push
